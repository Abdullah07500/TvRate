<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - TvRate</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .auth-box { max-width: 420px; margin: 60px auto; padding: 40px; background: rgba(26,26,46,.95); border-radius: 20px; border: 1px solid rgba(1,180,228,.3); }
        .auth-box h1 { text-align:center; color:#fff; margin-bottom:8px; }
        .auth-box .subtitle { text-align:center; color:#aaa; margin-bottom:28px; font-size:.9rem; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display:block; color:#fff; margin-bottom:7px; font-weight:500; }
        .form-group input { width:100%; padding:12px 14px; background:rgba(255,255,255,.07); border:2px solid rgba(1,180,228,.3); color:#fff; border-radius:10px; font-size:1rem; box-sizing:border-box; transition:border-color .2s; }
        .form-group input:focus { outline:none; border-color:#01b4e4; }
        .form-group input::placeholder { color:#666; }
        .form-group .hint { color:#777; font-size:.8rem; margin-top:5px; }
        .btn-primary { width:100%; padding:13px; background:linear-gradient(135deg,#01b4e4,#019fc5); color:#fff; border:none; border-radius:10px; font-size:1.05rem; font-weight:600; cursor:pointer; transition:opacity .2s; }
        .btn-primary:hover { opacity:.9; }
        .auth-switch { text-align:center; margin-top:20px; color:#aaa; font-size:.9rem; }
        .auth-switch a { color:#01b4e4; text-decoration:none; }
        .error-box { background:rgba(231,76,60,.15); color:#ff6b6b; border:1px solid rgba(231,76,60,.4); padding:11px; border-radius:8px; margin-bottom:16px; display:none; text-align:center; font-size:.9rem; }
        .error-box.show { display:block; }
    </style>
</head>
<body>
    <header class="site-header" id="site-nav"></header>

    <main class="main-content">
        <div class="auth-box">
            <div style="text-align:center;font-size:2.5rem;margin-bottom:10px">🎬</div>
            <h1>Create Account</h1>
            <p class="subtitle">Join TvRate and start rating movies</p>

            <div id="errorBox" class="error-box"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="e.g. moviefan99" required autocomplete="username" maxlength="20">
                    <p class="hint">3-20 characters, letters, numbers, underscores only</p>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="At least 6 characters" required autocomplete="new-password">
                </div>
                <button type="submit" class="btn-primary" id="submitBtn">Create Account</button>
            </form>

            <div class="auth-switch">
                Already have an account? <a href="/login">Login</a>
            </div>
        </div>
    </main>

    <script>
        window.ACTIVE_NAV = 'register';
    </script>
    <script src="/js/auth.js"></script>
    <script>
        window.addEventListener('auth-ready', ({ detail }) => {
            if (detail.user) window.location.href = '/list';
        });

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const errBox = document.getElementById('errorBox');
            btn.disabled = true; btn.textContent = 'Creating account...';
            errBox.classList.remove('show');

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                const text = await res.text();
                let data = {};
                try { data = JSON.parse(text); } catch {}
                if (res.ok && data.success) {
                    window.location.href = '/list';
                } else {
                    errBox.textContent = data.error || 'Registration failed';
                    errBox.classList.add('show');
                    btn.disabled = false; btn.textContent = 'Create Account';
                }
            } catch (err) {
                errBox.textContent = 'Connection error. Please try again.';
                errBox.classList.add('show');
                btn.disabled = false; btn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
