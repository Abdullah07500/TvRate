<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - TvRate</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .profile-header{background:rgba(26,26,46,.9);border-radius:16px;padding:30px;margin-bottom:30px;border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:24px;flex-wrap:wrap}
        .profile-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#01b4e4,#019fc5);display:flex;align-items:center;justify-content:center;font-size:2.2rem;font-weight:700;color:#fff;flex-shrink:0}
        .profile-info{flex:1}
        .profile-username{color:#fff;font-size:1.6rem;font-weight:700;margin-bottom:4px}
        .profile-bio{color:#aaa;font-size:.9rem;margin-bottom:12px}
        .profile-stats{display:flex;gap:24px}
        .stat{text-align:center;cursor:pointer;transition:all .2s}
        .stat:hover{opacity:.8;transform:scale(1.05)}
        .stat-value{color:#fff;font-size:1.3rem;font-weight:700}
        .stat-label{color:#888;font-size:.75rem;margin-top:2px}
        .follow-btn{padding:10px 24px;border-radius:20px;border:none;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s}
        .follow-btn.follow{background:#01b4e4;color:#fff}
        .follow-btn.unfollow{background:rgba(255,255,255,.1);color:#ccc;border:1px solid rgba(255,255,255,.2)}
        .section-tabs{display:flex;gap:10px;margin-bottom:24px}
        .tab-btn{padding:8px 20px;border-radius:20px;border:1px solid rgba(255,255,255,.15);background:transparent;color:#aaa;cursor:pointer;font-size:.9rem;transition:all .2s}
        .tab-btn.active{background:#01b4e4;border-color:#01b4e4;color:#fff}
        .review-card{background:rgba(26,26,46,.9);border-radius:14px;border:1px solid rgba(255,255,255,.08);padding:16px;margin-bottom:14px;display:flex;gap:16px}
        .review-card img{width:60px;min-width:60px;aspect-ratio:2/3;object-fit:cover;border-radius:8px}
        .r-title{color:#fff;font-weight:600;margin-bottom:4px}
        .r-rating{color:#f5c518;font-weight:700;margin-bottom:6px}
        .r-text{color:#ccc;font-size:.88rem;line-height:1.5}
        .r-date{color:#666;font-size:.75rem;margin-top:8px}
        .watchlist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:14px}
        .wl-card{background:rgba(26,26,46,.9);border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.08);cursor:pointer;transition:all .2s}
        .wl-card:hover{border-color:#01b4e4;transform:translateY(-4px)}
        .wl-card img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block}
        .wl-title{padding:8px;color:#fff;font-size:.8rem;font-weight:600}
        .wl-year{padding:0 8px 8px;color:#888;font-size:.7rem}
        .empty-section{text-align:center;padding:40px;color:#666;font-size:.95rem}
        .edit-bio-btn{background:transparent;border:1px solid rgba(1,180,228,.4);color:#01b4e4;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:.85rem;margin-top:8px}
        .save-bio-btn{background:#01b4e4;border:none;color:#fff;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:.85rem}
        
        /* Modal styles */
        .stat-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center;padding:20px}
        .stat-modal.active{display:flex}
        .stat-modal-content{background:rgba(26,26,46,.95);border-radius:16px;border:1px solid rgba(255,255,255,.08);width:100%;max-width:500px;max-height:80vh;overflow-y:auto;padding:24px}
        .stat-modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
        .stat-modal-title{color:#fff;font-size:1.3rem;font-weight:700}
        .stat-modal-close{background:none;border:none;color:#888;font-size:1.5rem;cursor:pointer;transition:color .2s}
        .stat-modal-close:hover{color:#fff}
        
        /* User list item styles */
        .user-item{background:rgba(255,255,255,.05);border-radius:10px;padding:12px;margin-bottom:10px;display:flex;gap:12px;align-items:center;cursor:pointer;transition:all .2s}
        .user-item:hover{background:rgba(1,180,228,.1);border-left:2px solid #01b4e4}
        .user-avatar-small{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#01b4e4,#019fc5);display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:600;color:#fff;flex-shrink:0}
        .user-info{flex:1;min-width:0}
        .user-username{color:#fff;font-weight:600;font-size:.95rem;text-decoration:none}
        .user-username:hover{color:#01b4e4}
        .user-bio{color:#888;font-size:.8rem;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    </style>
</head>
<body>
    <header class="site-header" id="site-nav"></header>

    <main class="main-content section-page">
        <div id="notFound" style="display:none;text-align:center;padding:80px;color:#777">
            <div style="font-size:3rem;margin-bottom:16px">👤</div>
            <p style="font-size:1.1rem">User not found</p>
        </div>

        <div id="profileContent" style="display:none">
            <div class="profile-header">
                <div class="profile-avatar" id="profileAvatar"></div>
                <div class="profile-info">
                    <div class="profile-username" id="profileUsername"></div>
                    <div class="profile-bio" id="profileBioArea"></div>
                    <div class="profile-stats">
                        <div class="stat" data-stat="reviews"><div class="stat-value" id="statReviews">0</div><div class="stat-label">Reviews</div></div>
                        <div class="stat" data-stat="watchlist"><div class="stat-value" id="statWatchlist">0</div><div class="stat-label">Watchlist</div></div>
                        <div class="stat" data-stat="followers"><div class="stat-value" id="statFollowers">0</div><div class="stat-label">Followers</div></div>
                        <div class="stat" data-stat="following"><div class="stat-value" id="statFollowing">0</div><div class="stat-label">Following</div></div>
                    </div>
                </div>
                <div id="followArea"></div>
            </div>

            <div class="section-tabs">
                <button class="tab-btn active" data-tab="reviews">Reviews</button>
                <button class="tab-btn" data-tab="watchlist">Watchlist</button>
            </div>

            <div id="tab-reviews"></div>
            <div id="tab-watchlist" style="display:none"></div>
        </div>
    </main>

    <!-- Modals for stats -->
    <div id="statModal" class="stat-modal">
        <div class="stat-modal-content">
            <div class="stat-modal-header">
                <div class="stat-modal-title" id="modalTitle"></div>
                <button class="stat-modal-close" id="modalClose">&times;</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <footer class="site-footer"><div class="footer-content"><p>&copy; 2026 TvRate</p></div></footer>

    <!-- Review submission modal (reused from browse/top pages) -->
    <div id="addToListModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">⭐ Submit Review</h2>
                <button class="modal-close" id="modalCloseBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div id="modalMovieInfo" class="modal-movie-info"></div>
                <form id="addToListForm">
                    <div class="form-group">
                        <label for="userRating">Your Rating (1-10)</label>
                        <div class="rating-input-wrapper">
                            <input type="number" id="userRating" min="1" max="10" step="0.1" required placeholder="8.5">
                            <span class="rating-suffix">/ 10</span>
                        </div>
                        <div class="rating-stars" id="ratingStars"></div>
                    </div>
                    <div class="form-group">
                        <label for="userReview">Your Review</label>
                        <textarea id="userReview" rows="4" required placeholder="Share your thoughts..." maxlength="500"></textarea>
                        <span class="char-counter"><span id="charCount">0</span>/500</span>
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="modal-btn modal-btn-cancel" id="modalCancelBtn">Cancel</button>
                        <button type="submit" class="modal-btn modal-btn-submit">Submit Review</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <div id="toast" class="toast hidden"><span id="toastMessage"></span></div>

    <script>window.ACTIVE_NAV = 'profile';</script>
    <script src="/js/auth.js"></script>
    <script src="/js/movie-card.js"></script>
    <script src="/js/modal-handler.js"></script>
    <script src="/js/profile.js"></script>
</body>
</html>
