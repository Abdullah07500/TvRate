<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Watchlist - TvRate</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .watchlist-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:18px; padding: 0 0 40px; }
        .watchlist-card { background:rgba(26,26,46,.9); border-radius:12px; overflow:hidden; border:1px solid rgba(255,255,255,.08); transition:transform .2s; position:relative; cursor:pointer; }
        .watchlist-card:hover { transform:translateY(-4px); }
        .watchlist-card:focus { outline:2px solid #01b4e4; outline-offset:2px; }
        .watchlist-card img { width:100%; aspect-ratio:2/3; object-fit:cover; display:block; }
        .watchlist-card .card-info { padding:10px; }
        .watchlist-card .card-title { color:#fff; font-size:.85rem; font-weight:600; margin-bottom:4px; line-height:1.3; }
        .watchlist-card .card-meta { color:#aaa; font-size:.75rem; }
        .watchlist-card .remove-btn { position:absolute; top:7px; right:7px; background:rgba(0,0,0,.7); color:#ff6b6b; border:none; border-radius:50%; width:28px; height:28px; cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center; transition:background .2s; z-index:10; }
        .watchlist-card .remove-btn:hover { background:rgba(231,76,60,.8); color:#fff; }
        .type-badge { display:inline-block; padding:2px 7px; border-radius:4px; font-size:.7rem; font-weight:600; margin-top:4px; }
        .type-movie { background:rgba(1,180,228,.2); color:#01b4e4; }
        .type-tv { background:rgba(255,152,0,.2); color:#ff9800; }
        .empty-state { text-align:center; padding:80px 20px; color:#777; }
        .empty-state .icon { font-size:4rem; margin-bottom:16px; }
        .empty-state p { font-size:1.1rem; margin-bottom:20px; }
    </style>
</head>
<body>
    <header class="site-header" id="site-nav"></header>

    <main class="main-content section-page">
        <div class="page-header">
            <h1 class="page-title">📋 My Watchlist</h1>
            <p class="page-description">Movies and shows you want to watch</p>
        </div>

        <div id="loginPrompt" class="empty-state" style="display:none">
            <div class="icon">🔐</div>
            <p>Login to see your watchlist</p>
            <a href="/login" class="hero-search-btn">Login</a>
        </div>

        <div id="emptyState" class="empty-state" style="display:none">
            <div class="icon">🎬</div>
            <p>Your watchlist is empty</p>
            <a href="/browse" class="hero-search-btn">Browse Movies</a>
        </div>

        <div id="watchlistGrid" class="watchlist-grid"></div>
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <p>&copy; 2026 TvRate - Community Movie Ratings</p>
        </div>
    </footer>

    <div id="toast" class="toast hidden"><span id="toastMessage"></span></div>

    <div id="addToListModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">⭐ Submit Review</h2>
                <button class="modal-close" id="modalCloseBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div id="modalMovieInfo" class="modal-movie-info"></div>
                <form id="addToListForm">
                    <div class="form-group">
                        <label for="userRating">Your Rating (1-10)</label>
                        <div class="rating-input-wrapper">
                            <input type="number" id="userRating" name="rating" min="1" max="10" step="0.1" required placeholder="8.5">
                            <span class="rating-suffix">/ 10</span>
                        </div>
                        <div class="rating-stars" id="ratingStars"></div>
                    </div>
                    <div class="form-group">
                        <label for="userReview">Your Review</label>
                        <textarea id="userReview" name="review" rows="4" required placeholder="Share your thoughts..." maxlength="500"></textarea>
                        <span class="char-counter"><span id="charCount">0</span>/500</span>
                    </div>
                    <div class="form-notice">

                    </div>
                    <div class="modal-actions">
                        <button type="button" class="modal-btn modal-btn-cancel" id="modalCancelBtn">Cancel</button>
                        <button type="submit" class="modal-btn modal-btn-submit">Submit Review</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>window.ACTIVE_NAV = 'watchlist';</script>
    <script src="/js/auth.js"></script>
    <script src="/js/movie-card.js"></script>
    <script src="/js/modal-handler.js"></script>
    <script src="/js/watchlist-page.js"></script>
</body>
</html>
