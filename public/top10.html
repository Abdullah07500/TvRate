<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Movies - TvRate</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .top-tabs{display:flex;gap:0;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:4px;width:fit-content;margin:0 auto 32px}
        .top-tab-btn{padding:8px 26px;border:none;background:transparent;color:#aaa;cursor:pointer;font-size:.9rem;font-weight:600;border-radius:999px;transition:all .2s;white-space:nowrap}
        .top-tab-btn.active{background:#01b4e4;color:#fff;box-shadow:0 2px 8px rgba(1,180,228,.4)}
        .top-tab-btn:hover:not(.active){color:#fff}
    </style>
</head>
<body>
    <header class="site-header" id="site-nav"></header>
    <main class="main-content section-page">
        <div class="page-header">
            <h1 class="page-title" id="pageTitle">🔥 Top 10 This Week</h1>
            <p class="page-description" id="pageDesc">The most trending movies — click a poster to review</p>
        </div>

        <div class="top-tabs">
            <button class="top-tab-btn active" data-tab="top10">Top 10</button>
            <button class="top-tab-btn" data-tab="top100">Top 100</button>
            <button class="top-tab-btn" data-tab="popular">Popular</button>
        </div>

        <div id="loadingIndicator" class="loading-state hidden"><div class="spinner"></div><p>Loading...</p></div>
        <div id="errorMessage" class="error-banner hidden"></div>
        <div id="moviesGrid" class="movie-grid"></div>
    </main>
    <footer class="site-footer"><div class="footer-content"><p>&copy; 2026 TvRate</p></div></footer>

    <div id="addToListModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">⭐ Submit Review</h2>
                <button class="modal-close" id="modalCloseBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div id="modalMovieInfo" class="modal-movie-info"></div>
                <form id="addToListForm">
                    <div class="form-group">
                        <label for="userRating">Your Rating (1-10)</label>
                        <div class="rating-input-wrapper">
                            <input type="number" id="userRating" min="1" max="10" step="0.1" required placeholder="8.5">
                            <span class="rating-suffix">/ 10</span>
                        </div>
                        <div class="rating-stars" id="ratingStars"></div>
                    </div>
                    <div class="form-group">
                        <label for="userReview">Your Review</label>
                        <textarea id="userReview" rows="4" required placeholder="Share your thoughts..." maxlength="500"></textarea>
                        <span class="char-counter"><span id="charCount">0</span>/500</span>
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="modal-btn modal-btn-cancel" id="modalCancelBtn">Cancel</button>
                        <button type="submit" class="modal-btn modal-btn-submit">Submit Review</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <div id="toast" class="toast hidden"><span id="toastMessage"></span></div>

    <script>window.ACTIVE_NAV = 'top10';</script>
    <script src="/js/auth.js"></script>
    <script src="/js/movie-card.js"></script>
    <script src="/js/modal-handler.js"></script>
    <script src="/js/top10.js"></script>
</body>
</html>
